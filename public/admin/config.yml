backend:
  name: github
  repo: jayisadesigner/tyler-chou-law
  branch: main
  auth_type: pkce
  app_id: Ov23liCZ3fMJIr8wMfvP
  # Force direct GitHub OAuth (bypass Netlify proxy)
  base_url: https://github.com
  auth_endpoint: login/oauth/authorize

media_folder: "src/assets/images/blog"
public_folder: "/assets/images/blog"

collections:
  - name: "blog"
    label: "Love Letters"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "Tyler Chou" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "string", hint: "Comma-separated list of tags" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly version of title (auto-generated if left blank)" }
      - { label: "Body", name: "body", widget: "markdown" }

