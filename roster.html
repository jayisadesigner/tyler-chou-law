<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { background-color: #932125; }
      body:not(.ready) { visibility: hidden; }
    </style>
    <script>
      window.addEventListener('load', function() {
        document.body.classList.add('ready');
      });
    </script>
    <title>Creator Clients | Tyler Chou Law Roster</title>
    <meta name="description" content="Meet the YouTube creators and digital entrepreneurs Tyler Chou represents. Protecting the empires of tomorrow's media companies." />
    <link rel="canonical" href="https://tylerchoulaw.com/roster.html" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Creator Clients | Tyler Chou Law Roster" />
    <meta property="og:description" content="Meet the YouTube creators and digital entrepreneurs Tyler Chou represents." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tylerchoulaw.com/roster.html" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Creator Clients | Tyler Chou Law Roster" />
    <meta name="twitter:description" content="Meet the YouTube creators and digital entrepreneurs Tyler Chou represents." />
    
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Tyler Chou Law Roster",
      "description": "Creator clients represented by Tyler Chou"
    }
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header></header>
    
    <main id="main-content">
      <!-- Hero Section -->
      <section class="hero section">
        <div class="container">
          <h1>Creator Empires We Protect</h1>
          <p class="hero-subheadline">We represent top YouTube creators and creator-led businesses.</p>
        </div>
      </section>

      <!-- Roster Grid -->
      <section class="roster section section-reveal">
        <div class="container-wide">
          <div class="roster-header">
            <h2 class="roster-title">who we work with</h2>
          </div>
          <div class="roster-grid">
            <button class="roster-card" data-creator="jennyhoyos" aria-label="View @jennyhoyos profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/jennyhoyos.png" alt="@jennyhoyos" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@jennyhoyos</p>
            </button>
            <button class="roster-card" data-creator="calebhammer" aria-label="View @calebhammer profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@calebhammer.png" alt="@calebhammer" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@calebhammer</p>
            </button>
            <button class="roster-card" data-creator="jesser" aria-label="View @jesser profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@jesser.webp" alt="@jesser" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@jesser</p>
            </button>
            <button class="roster-card" data-creator="jadroppingscience" aria-label="View @jadroppingscience profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@jadroppingscience.png" alt="@jadroppingscience" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@jadroppingscience</p>
            </button>
            <button class="roster-card" data-creator="sticks" aria-label="View @Sticks profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@sticks.jpg" alt="@Sticks" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@Sticks</p>
            </button>
            <button class="roster-card" data-creator="jacksfilms" aria-label="View @jacksfilms profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@jacksfilms.webp" alt="@jacksfilms" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@jacksfilms</p>
            </button>
            <button class="roster-card" data-creator="cassandrabankson" aria-label="View @cassandraBankson profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/@cassandraBankson.png" alt="@cassandraBankson" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@cassandraBankson</p>
            </button>
            <button class="roster-card" data-creator="samandcolby" aria-label="View @samandcolby profile">
              <div class="roster-card__image-wrapper">
                <img src="/src/assets/images/roster/samandcolby.png" alt="@samandcolby" class="roster-card__image">
                <div class="roster-card__overlay"></div>
                <div class="roster-card__scrim"></div>
              </div>
              <p class="roster-card__handle">@samandcolby</p>
            </button>
          </div>
        </div>
      </section>

      <!-- Creator Page Overlay (for transitions) -->
      <div class="creator-page-overlay" id="creator-page-overlay" aria-hidden="true">
        <!-- Close Button -->
        <button class="creator-page-overlay__close" aria-label="Close creator page">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 5L32 32L59 59" stroke="#F5F3FF" stroke-width="6"/>
            <path d="M59 5L32 32L5 59" stroke="#F5F3FF" stroke-width="6"/>
          </svg>
        </button>

        <!-- Breadcrumbs -->
        <nav class="creator-page-overlay__breadcrumbs" aria-label="Breadcrumb">
          <a href="/">tyler chou law for creators</a>
          <span>/</span>
          <a href="/roster.html">CREATORS</a>
          <span>/</span>
          <span class="creator-page-overlay__breadcrumb-name">sam and colby</span>
        </nav>

        <!-- Header (fades out in middle state) -->
        <div class="creator-page-overlay__header">
          <h2 class="creator-page-overlay__header-title">who we work with</h2>
          <a href="/roster.html" class="creator-page-overlay__header-link">view roster</a>
        </div>

        <!-- Main Content Container -->
        <div class="creator-page-overlay__container">
          <!-- Media Kit Stats (Row 1, Full Width) -->
          <div class="creator-page-overlay__stats">
            <div class="creator-page-overlay__stat">
              <p class="creator-page-overlay__stat-value"></p>
              <p class="creator-page-overlay__stat-label"></p>
            </div>
            <div class="creator-page-overlay__stat">
              <p class="creator-page-overlay__stat-value"></p>
              <p class="creator-page-overlay__stat-label"></p>
            </div>
            <div class="creator-page-overlay__stat">
              <p class="creator-page-overlay__stat-value"></p>
              <p class="creator-page-overlay__stat-label"></p>
            </div>
            <div class="creator-page-overlay__stat">
              <p class="creator-page-overlay__stat-value"></p>
              <p class="creator-page-overlay__stat-label"></p>
            </div>
          </div>

          <!-- Left: Creator Image Card (transitions from grid card) -->
          <div class="creator-page-overlay__image-card">
            <div class="creator-page-overlay__image-wrapper">
              <img src="" alt="" class="creator-page-overlay__image">
              <div class="creator-page-overlay__image-overlay"></div>
              <div class="creator-page-overlay__image-scrim"></div>
            </div>
            <p class="creator-page-overlay__handle"></p>
          </div>

          <!-- Right: Content Area (appears in middle/end states) -->
          <div class="creator-page-overlay__content-wrapper">
            <div class="creator-page-overlay__content">
              <!-- Description -->
              <div class="creator-page-overlay__description">
                <p class="creator-page-overlay__description-text"></p>
                <p class="creator-page-overlay__description-text"></p>
              </div>
            </div>

            <!-- Sample Videos (Row 3, Right Side) -->
            <div class="creator-page-overlay__videos">
              <!-- Videos will be populated dynamically -->
            </div>
          </div>
        </div>
      </div>
    </main>
    
    <footer></footer>
    
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
