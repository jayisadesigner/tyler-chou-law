<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Tyler Chou | Creator Legal Consultation</title>
    <meta name="description" content="Get in touch with Tyler Chou for legal representation and strategic advisory. Consultations available for YouTube creators and creator-led businesses." />
    <link rel="canonical" href="https://tylerchoulaw.com/contact.html" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Contact Tyler Chou | Creator Legal Consultation" />
    <meta property="og:description" content="Get in touch with Tyler Chou for legal representation and strategic advisory." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tylerchoulaw.com/contact.html" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Contact Tyler Chou | Creator Legal Consultation" />
    <meta name="twitter:description" content="Get in touch with Tyler Chou for legal representation and strategic advisory." />
    
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "mainEntity": {
        "@type": "LocalBusiness",
        "name": "Tyler Chou Law for Creators",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Los Angeles",
          "addressRegion": "CA",
          "addressCountry": "US"
        }
      }
    }
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header></header>
    
    <main id="main-content">
      <!-- Hero Section -->
      <section class="hero section">
        <div class="container">
          <h1>Let's Talk</h1>
          <p class="hero-subheadline">Ready to protect your empire? Get in touch.</p>
        </div>
      </section>

      <!-- Contact Form -->
      <section class="contact-form section section-reveal">
        <div class="container-narrow">
          <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
            <input type="hidden" name="form-name" value="contact" />
            <p class="hidden">
              <label>Don't fill this out if you're human: <input name="bot-field" /></label>
            </p>
            
            <div class="form-group">
              <label for="name">Name *</label>
              <input type="text" id="name" name="name" required />
            </div>
            
            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" name="email" required />
            </div>
            
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" />
            </div>
            
            <div class="form-group">
              <label for="inquiry-type">Inquiry Type *</label>
              <select id="inquiry-type" name="inquiry-type" required>
                <option value="">Select an option</option>
                <option value="contract-review">Contract Review</option>
                <option value="ip-protection">IP Protection</option>
                <option value="business-formation">Business Formation</option>
                <option value="fractional-ceo">Fractional CEO Services</option>
                <option value="ma-investment">M&A and Investment</option>
                <option value="creatorarq">CreatorArq Investment Inquiry</option>
                <option value="other">Other</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="message">Message *</label>
              <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            
            <div class="form-group">
              <label for="referral">How did you hear about us?</label>
              <input type="text" id="referral" name="referral" />
            </div>
            
            <button type="submit" class="cta-button">Send Message</button>
          </form>
        </div>
      </section>

      <!-- Contact Information -->
      <section class="contact-info section bg-obsidian section-reveal">
        <div class="container">
          <h2>Contact Information</h2>
          <div class="contact-details">
            <div class="contact-detail fade-in">
              <h3>Email</h3>
              <p><a href="mailto:tyler@tylerchoulaw.com">tyler@tylerchoulaw.com</a></p>
            </div>
            <div class="contact-detail fade-in">
              <h3>Location</h3>
              <p>Los Angeles, CA</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    
    <footer></footer>
    
    <script type="module" src="/src/scripts/main.js"></script>
    <script type="module" src="/src/scripts/forms.js"></script>
  </body>
</html>
