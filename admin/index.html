<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme color matches hero background for seamless browser chrome integration -->
    <meta name="theme-color" content="#120203" /> <!-- var(--obsidian) -->
    <title>Blog Editor - Tyler Chou Law</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Initialize Netlify Identity -->
    <script>
      if (window.netlifyIdentity) {
        // For custom domains, Identity needs to use the site's Netlify subdomain
        // Replace 'tyler-chou-law' with your actual Netlify site name
        // You can find this in your Netlify dashboard - it's the [site-name] in [site-name].netlify.app
        const currentHost = window.location.hostname;
        let identityApiUrl = window.location.origin;
        
        // If on custom domain, use the Netlify subdomain for Identity API
        // TODO: Replace 'tyler-chou-law' with your actual Netlify site name
        if (!currentHost.includes('.netlify.app') && !currentHost.includes('localhost')) {
          // Use your Netlify subdomain for Identity - this is what worked before
          identityApiUrl = 'https://tyler-chou-law.netlify.app';
          console.log('Using Netlify subdomain for Identity:', identityApiUrl);
        }
        
        // Initialize Identity with explicit API URL
        window.netlifyIdentity.init({
          APIUrl: identityApiUrl
        });
        
        // Handle OAuth callback - check URL for callback parameters
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        
        // Check for OAuth callback in query params or hash
        if (urlParams.has('access_token') || urlParams.has('token') || 
            hashParams.has('access_token') || hashParams.has('token') ||
            window.location.hash.includes('access_token')) {
          // OAuth callback detected - wait for Identity to process it
          window.netlifyIdentity.on('login', (user) => {
            if (user) {
              // Clean up URL and reload to show CMS
              const cleanUrl = window.location.origin + window.location.pathname;
              window.history.replaceState({}, document.title, cleanUrl);
              window.location.reload();
            }
          });
        }
        
        // Set up login handler
        window.netlifyIdentity.on("init", user => {
          console.log('Identity initialized, user:', user);
          if (user) {
            // User is already logged in
            console.log('User logged in:', user.email);
          } else {
            // User not logged in - login button will show
            console.log('No user, waiting for login...');
            window.netlifyIdentity.on("login", (user) => {
              console.log('Login successful:', user);
              // Small delay to ensure token is stored
              setTimeout(() => {
                window.location.reload();
              }, 500);
            });
          }
        });
        
        // Log any errors
        window.netlifyIdentity.on("error", (err) => {
          console.error('Identity error:', err);
        });
      }
    </script>
  </body>
</html>
