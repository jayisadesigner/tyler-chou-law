<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme color matches hero background for seamless browser chrome integration -->
    <meta name="theme-color" content="#120203" /> <!-- var(--obsidian) -->
    <title>Blog Editor - Tyler Chou Law</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Initialize Netlify Identity -->
    <script>
      // Handle OAuth callback - check for token in URL
      if (window.location.hash) {
        const hash = window.location.hash;
        if (hash.includes('access_token') || hash.includes('token')) {
          // OAuth callback detected, let Identity handle it
          window.netlifyIdentity.on('login', () => {
            // Remove hash from URL and reload
            window.location.hash = '';
            window.location.reload();
          });
        }
      }
      
      if (window.netlifyIdentity) {
        // Initialize Identity - it will auto-detect the correct API URL
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              // Don't redirect on login - let the page handle it naturally
              // The CMS will detect the user and load
            });
          }
        });
        // Initialize after setting up event handlers
        window.netlifyIdentity.init();
      }
    </script>
  </body>
</html>
