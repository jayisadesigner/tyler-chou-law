<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme color matches hero background for seamless browser chrome integration -->
    <meta name="theme-color" content="#120203" /> <!-- var(--obsidian) -->
    <title>Blog Editor - Tyler Chou Law</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Initialize Netlify Identity -->
    <script>
      if (window.netlifyIdentity) {
        // For custom domains, Identity API should use the site's Netlify subdomain
        // But we can also try using the custom domain with proper endpoint paths
        // Let Identity auto-detect the correct API URL
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
        // Initialize after setting up event handlers
        window.netlifyIdentity.init();
      }
    </script>
  </body>
</html>
