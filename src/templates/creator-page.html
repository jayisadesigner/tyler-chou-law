<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme color matches hero background for seamless browser chrome integration -->
    <meta name="theme-color" content="#120203" /> <!-- var(--obsidian) -->
    <style>
      body:not(.ready) { visibility: hidden; }
    </style>
    <script>
      window.addEventListener('load', function() {
        document.body.classList.add('ready');
      });
    </script>
    <title>{{metaTitle}} | Tyler Chou Law Roster</title>
    <meta name="description" content="{{metaDescription}}" />
    <link rel="canonical" href="https://tylerchoulaw.com/roster/{{creatorId}}.html" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{metaTitle}} | Tyler Chou Law Roster" />
    <meta property="og:description" content="{{metaDescription}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tylerchoulaw.com/roster/{{creatorId}}.html" />
    {{ogImage}}
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{metaTitle}} | Tyler Chou Law Roster" />
    <meta name="twitter:description" content="{{metaDescription}}" />
    {{twitterImage}}
    
    <!-- JSON-LD Schema: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{name}}",
      "description": "{{metaDescription}}",
      "url": "https://tylerchoulaw.com/roster/{{creatorId}}.html",
      "sameAs": [{{youtubeUrl}}]
    }
    </script>
    
    <!-- JSON-LD Schema: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://tylerchoulaw.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Roster",
          "item": "https://tylerchoulaw.com/roster.html"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{name}}",
          "item": "https://tylerchoulaw.com/roster/{{creatorId}}.html"
        }
      ]
    }
    </script>
  </head>
  <body class="page-creator">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header></header>
    
    <main id="main-content">
      <article class="content-section content-section--media-bleed content-section--parallax">
        <div class="content-section__container">
          <!-- Media (first on mobile, left side on desktop with --media-left modifier) -->
          <div class="content-section__media">
            <div class="background-image">
              <img src="{{imageSrc}}" alt="{{name}}" class="background-image__img">
            </div>
            <h1 class="creator-name">{{name}}</h1>
          </div>

          <!-- Content (second on mobile, right side on desktop, left with --media-left modifier) -->
          <div class="content-section__content">
            <!-- Stats -->
            <div class="creator-stats">
              <div class="creator-stat">
                <p class="creator-stat-value">{{stat1Value}}</p>
                <p class="creator-stat-label">{{stat1Label}}</p>
              </div>
              <div class="creator-stat">
                <p class="creator-stat-value">{{stat2Value}}</p>
                <p class="creator-stat-label">{{stat2Label}}</p>
              </div>
              <div class="creator-stat">
                <p class="creator-stat-value">{{stat3Value}}</p>
                <p class="creator-stat-label">{{stat3Label}}</p>
              </div>
              <div class="creator-stat">
                <p class="creator-stat-value">{{stat4Value}}</p>
                <p class="creator-stat-label">{{stat4Label}}</p>
              </div>
            </div>
            
            <!-- Description -->
            <div class="creator-description">
              {{description}}
            </div>
            
            <!-- Videos -->
            {{videos}}
          </div>
        </div>
      </article>
    </main>
    
    <footer></footer>
    
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
