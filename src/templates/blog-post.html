<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Theme color matches hero background for seamless browser chrome integration -->
    <meta name="theme-color" content="#120203" /> <!-- var(--obsidian) -->
    <style>
      body:not(.ready) { visibility: hidden; }
    </style>
    <script>
      window.addEventListener('load', function() {
        document.body.classList.add('ready');
      });
    </script>
    <title>{{title}} | Love Letters to Creators</title>
    <meta name="description" content="{{excerpt}}" />
    <link rel="canonical" href="https://tylerchoulaw.com/love-letters/{{slug}}.html" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{title}} | Love Letters to Creators" />
    <meta property="og:description" content="{{excerpt}}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://tylerchoulaw.com/love-letters/{{slug}}.html" />
    {{ogImage}}
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}} | Love Letters to Creators" />
    <meta name="twitter:description" content="{{excerpt}}" />
    {{twitterImage}}
    
    <!-- JSON-LD Schema: BlogPosting -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "{{title}}",
      "description": "{{excerpt}}",
      "datePublished": "{{datePublished}}",
      "dateModified": "{{dateModified}}",
      "author": {
        "@type": "Person",
        "name": "{{author}}",
        "url": "https://tylerchoulaw.com/about.html"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Tyler Chou Law for Creators",
        "url": "https://tylerchoulaw.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tylerchoulaw.com/src/assets/images/home/tyler-chou-mongram-logo.svg"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://tylerchoulaw.com/love-letters/{{slug}}.html"
      },
      {{featuredImageSchema}}
      "articleBody": "{{articleBody}}"
    }
    </script>
    
    <!-- JSON-LD Schema: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://tylerchoulaw.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Love Letters",
          "item": "https://tylerchoulaw.com/love-letters.html"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{title}}",
          "item": "https://tylerchoulaw.com/love-letters/{{slug}}.html"
        }
      ]
    }
    </script>
  </head>
  <body class="page-blog-post">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
      <!-- Navigation will be injected here -->
    </header>
    
    <main id="main-content">
      <!-- Breadcrumb Navigation -->
      <nav class="blog-post-breadcrumb" aria-label="Breadcrumb">
        <div class="container">
          <a href="/">Home</a>
          <span class="blog-post-breadcrumb__separator">/</span>
          <a href="/love-letters.html">Love Letters</a>
          <span class="blog-post-breadcrumb__separator">/</span>
          <span class="blog-post-breadcrumb__current">{{title}}</span>
        </div>
      </nav>
      
      <article class="blog-post">
        <section class="hero hero--blog-post">
          {{featuredImageHero}}
          <div class="hero-content hero-content--blog-post container-narrow">
            <h1 class="hero-headline hero-headline--blog-post">{{title}}</h1>
            <div class="blog-post-meta">
              <span class="blog-post-meta__author">By <span class="blog-post-meta__author-name">{{author}}</span></span>
              <time class="blog-post-meta__date" datetime="{{dateISO}}">{{date}}</time>
              <span class="blog-post-meta__reading-time">{{readingTime}} min read</span>
            </div>
            {{tagsHTML}}
          </div>
        </section>
        
        <div class="blog-post-content container-narrow">
          {{content}}
        </div>
        
        <footer class="blog-post-footer">
          <div class="container-narrow">
            <a href="/contact.html" class="btn btn--primary btn--on-dark">Get in Touch</a>
          </div>
        </footer>
      </article>
    </main>
    
    <footer>
      <!-- Footer will be injected here -->
    </footer>
    
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
