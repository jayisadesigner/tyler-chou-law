<section class="hero hero--inner-page section{{variant-class}}">
  <!-- Background Image Component -->
  {{background-image}}
  
  <!-- Hero Content Grid -->
  <div class="hero-content hero-content--inner-page container-wide">
    <!-- Eyebrow (Column 1, Row 1) -->
    <div class="hero-eyebrow">
      <p class="hero-eyebrow__text">{{eyebrow}}</p>
    </div>
    
    <!-- Headline (Columns 2-4, Row 1) - Contains nested subheadline for mobile-first stacking -->
    <div class="hero-headline-wrapper">
      <h1 class="hero-headline hero-headline--inner-page">{{headline}}</h1>
      <p class="hero-subheadline hero-subheadline--inner-page hero-subheadline--nested">{{subheadline}}</p>
    </div>
    
    <!-- Subheadline Wrapper (Columns 2-4, Row 2) - Desktop only, hidden on mobile -->
    <div class="hero-subheadline-wrapper">
      <p class="hero-subheadline hero-subheadline--inner-page hero-subheadline--desktop">{{subheadline}}</p>
    </div>
  </div>
</section>
