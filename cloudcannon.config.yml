paths:
  static: src
  uploads: src/assets/images/uploads
  output: dist
timezone: America/Los_Angeles
markdown:
  engine: commonmark
  options: {}

collections_config:
  pages:
    path: ""
    glob:
      - "*.html"
      - "!404.html"
    icon: wysiwyg
    name: Pages
    disable_add: true
    disable_add_folder: true
    disable_delete: true

  roster:
    path: content/roster
    icon: person
    name: Roster
    singular_name: Creator
    add_options:
      - name: Add Creator
        schema: default
    schemas:
      default:
        path: .cloudcannon/schemas/roster-creator.yml
    _editables:
      content:
        italic: true
        bold: true
        link: true
    _inputs:
      handle:
        label: Handle
        comment: "YouTube/social handle, e.g. @jennyhoyos"
      slug:
        label: Slug
        comment: "URL slug — no spaces, lowercase, e.g. jennyhoyos"
      photo:
        type: image
        label: Photo
        comment: "Square photo, minimum 800x800px"
        options:
          paths:
            uploads: src/assets/images/roster
      order:
        type: number
        label: Display Order
        comment: "Lower numbers appear first in the grid"
      external_url:
        label: External URL
        comment: "If set, clicking the roster card links here instead of generating an internal page. Leave empty to generate a page."
      youtube_url:
        label: YouTube Channel URL
      seo_description:
        type: textarea
        label: SEO Description
        comment: "Appears in Google search results and social previews (150-160 characters recommended)"
      stats:
        label: Stats
        comment: "Up to 4 stats shown on the creator page"
      bio:
        type: array
        label: Bio
        comment: "Each item is one paragraph"
      featured_videos:
        type: array
        label: Featured Video IDs
        comment: "YouTube video IDs only (the part after watch?v=)"

  testimonials:
    path: content/data
    glob:
      - "testimonials.yml"
    icon: star
    name: Testimonials
    singular_name: Testimonial
    _inputs:
      name:
        label: Name
      handle:
        label: Handle
        comment: "Social handle, e.g. @jennyhoyos"
      stats:
        label: Stats
        comment: "Follower count or other stat, e.g. 9.85M followers"
      quote:
        type: textarea
        label: Quote
      photo:
        type: image
        label: Photo
        options:
          paths:
            uploads: src/assets/images/roster

  home_services:
    path: content/data
    glob:
      - "home-services.yml"
    icon: folder
    name: Home Service Cards
    singular_name: Service Card
    _inputs:
      title:
        label: Title
      description:
        type: textarea
        label: Description
      button_text:
        label: Button Text
      link:
        label: Link URL
        comment: "Internal path (e.g. /services.html#empire) or external URL"

  services_caps_infra:
    path: content/data
    glob:
      - "services-caps-infra.yml"
    icon: grid_view
    name: Services — Infrastructure Capabilities
    singular_name: Capability Card
    _inputs:
      title:
        label: Title
      text:
        type: textarea
        label: Text

  services_caps_ip:
    path: content/data
    glob:
      - "services-caps-ip.yml"
    icon: grid_view
    name: Services — IP Capabilities
    singular_name: Capability Card
    _inputs:
      title:
        label: Title
      text:
        type: textarea
        label: Text

  creatorarq_caps_agencies:
    path: content/data
    glob:
      - "creatorarq-caps-agencies.yml"
    icon: grid_view
    name: CreatorArq — Agencies Capabilities
    singular_name: Capability Card
    _inputs:
      title:
        label: Title
      text:
        type: textarea
        label: Text

  creatorarq_caps_exit:
    path: content/data
    glob:
      - "creatorarq-caps-exit.yml"
    icon: grid_view
    name: CreatorArq — Exit Capabilities
    singular_name: Capability Card
    _inputs:
      title:
        label: Title
      text:
        type: textarea
        label: Text

  blog:
    path: content/blog
    icon: event_available
    name: Blog
    singular_name: Post
    _inputs:
      title:
        label: Title
      date:
        type: date
        label: Date
      description:
        type: textarea
        label: Description
      cover_image:
        type: image
        label: Cover Image
        options:
          paths:
            uploads: src/assets/images/blog
