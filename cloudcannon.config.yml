paths:
  static: src
  uploads: src/assets/images/uploads
  uploads_use_relative_path: false

source: ""
timezone: America/Los_Angeles

markdown:
  engine: commonmark
  options: {}

# ─── Bookshop integration ─────────────────────────────────────────────────────
# CloudCannon auto-discovers components in component-library/ and exposes them
# in the visual editor as draggable blocks. See https://cloudcannon.com/bookshop/.
component_browser: true

# ─── Collections ──────────────────────────────────────────────────────────────
collections_config:
  pages:
    path: src/content/pages
    output: true
    icon: wysiwyg
    name: Pages
    singular_name: Page
    schemas:
      default:
        path: .cloudcannon/schemas/page.md
        name: New Page
    _inputs:
      blocks:
        type: array
        comment: "Drag and drop sections to build the page."
        options:
          structures: _structures.bookshop_components
      title:
        comment: "Browser tab title and Google search result heading."
      description:
        comment: "Meta description for search engines and social sharing (140-155 characters recommended)."
        type: textarea
      pageClass:
        comment: "Optional CSS class added to <body> for page-specific styling."
      ogImage:
        type: image
        comment: "Image used for social sharing previews (1200x630 recommended)."
      robots:
        comment: "Leave empty for normal indexing. Use 'noindex, follow' to hide from search engines (e.g. thank-you page)."

  blog:
    path: src/content/blog
    output: true
    url: "/love-letters/[slug]/"
    icon: event_available
    name: Love Letters (Blog)
    singular_name: Love Letter
    schemas:
      default:
        path: .cloudcannon/schemas/love-letter.md
        name: New Love Letter
    _inputs:
      title:
        comment: "Headline as it appears in the post and in search results."
      slug:
        comment: "URL slug. Lowercase, hyphenated, no spaces. e.g. 'how-to-protect-your-channel'."
      date:
        type: date
      description:
        type: textarea
        comment: "1-2 sentence summary used in listings, social previews, and search results."
      author:
        comment: "Defaults to Tyler Chou. Override only when a guest authors a post."
      reading_time:
        type: number
        comment: "Estimated minutes to read."
      featured_image:
        type: image
        comment: "Hero image for the post."
        options:
          paths:
            uploads: src/assets/images/blog
      image_alt:
        comment: "Description of the image for accessibility and SEO."

  clients:
    path: src/content/clients
    output: true
    url: "/clients/[slug]/"
    icon: person
    name: Clients
    singular_name: Client
    schemas:
      default:
        path: .cloudcannon/schemas/client.yml
        name: New Client
    _editables:
      content:
        italic: true
        bold: true
        link: true
    _inputs:
      handle:
        label: Handle
        comment: "YouTube/social handle, e.g. @jennyhoyos."
      slug:
        label: Slug
        comment: "URL slug — no spaces, lowercase, e.g. jennyhoyos."
      photo:
        type: image
        label: Photo
        comment: "Square photo, minimum 800x800px."
        options:
          paths:
            uploads: src/assets/images/clients
      order:
        type: number
        label: Display Order
        comment: "Lower numbers appear first in the grid."
      external_url:
        label: External URL
        comment: "If set, the client card links here instead of an internal page."
      youtube_url:
        label: YouTube Channel URL
      seo_description:
        type: textarea
        label: SEO Description
        comment: "Appears in Google and social previews (150-160 characters recommended)."
      stats:
        label: Stats
        comment: "Up to 4 stats shown on the creator page."
      bio:
        type: array
        label: Bio
        comment: "Each item is one paragraph."
      featured_videos:
        type: array
        label: Featured Video IDs
        comment: "YouTube video IDs (the part after watch?v=)."

  press:
    path: src/content/press
    output: false
    icon: article
    name: Press Citations
    singular_name: Press Citation
    schemas:
      default:
        path: .cloudcannon/schemas/press-citation.md
        name: New Press Citation
    _inputs:
      publication:
        comment: "Publication name, e.g. Forbes, AdWeek."
      title:
        comment: "Article or episode title."
      url:
        comment: "Direct link to the original piece."
      date:
        type: date
      logo:
        type: image
        options:
          paths:
            uploads: src/assets/images/press
      type:
        comment: "Print, Podcast, Video, or Speaking — used to filter the press grid."
      summary:
        type: textarea
        comment: "2–3 sentence summary in Tyler's words."
      self_quote:
        type: textarea
        comment: "One sentence Tyler said in the piece."

  speaking:
    path: src/content/speaking
    output: false
    icon: campaign
    name: Speaking Engagements
    singular_name: Speaking Engagement
    schemas:
      default:
        path: .cloudcannon/schemas/speaking-engagement.md
        name: New Speaking Engagement
    _inputs:
      event:
        comment: "Event name, e.g. SXSW 2024."
      title:
        comment: "Talk title or panel name."
      date:
        type: date
      location:
        comment: "City, country."
      description:
        type: textarea
      photo:
        type: image
        options:
          paths:
            uploads: src/assets/images/speaking

# ─── Site-wide data ───────────────────────────────────────────────────────────
data_config:
  site:
    path: src/_data/site.json
  nav:
    path: src/_data/nav.yml
  seo:
    path: src/_data/seo.yml

_array_structures:
  bookshop_components:
    style: modal
    values: []
    # Bookshop populates this list automatically from component-library/.
