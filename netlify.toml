[build]
  command = "npm run build"
  publish = "dist"

# Ensure assets and components are served correctly
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/components/*"
  to = "/components/:splat"
  status = 200
  force = true

# Exclude admin folder from catch-all redirect
# This allows config.yml and other admin files to be served directly
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# Cache assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Permissions-Policy to disable compute-pressure (fixes console violation)
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "compute-pressure=()"

[build.environment]
  NODE_VERSION = "20"
