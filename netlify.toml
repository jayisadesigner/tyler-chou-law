[build]
  command = "npm run build"
  publish = "dist"

# Ensure assets and components are served correctly
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/components/*"
  to = "/components/:splat"
  status = 200
  force = true

# Netlify Identity API endpoints - route to Identity service
# These endpoints are accessed by Decap CMS for user authentication
[[redirects]]
  from = "/.netlify/identity/*"
  to = "https://identity.netlify.com/v1/:splat"
  status = 200
  force = true

# Redirect root-level Identity API calls (Decap CMS may try these)
[[redirects]]
  from = "/user"
  to = "/.netlify/identity/user"
  status = 200
  force = true

[[redirects]]
  from = "/settings"
  to = "/.netlify/identity/settings"
  status = 200
  force = true

# Exclude admin folder from catch-all redirect
# This allows config.yml and other admin files to be served directly
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# Headers for admin config.yml - ensure correct Content-Type and CORS
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Cache assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Permissions-Policy to disable compute-pressure (fixes console violation)
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "compute-pressure=()"

[build.environment]
  NODE_VERSION = "20"
