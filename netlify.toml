[build]
  command = "npm run build"
  publish = "dist"

# Ensure assets and components are served correctly
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/components/*"
  to = "/components/:splat"
  status = 200
  force = true

# Netlify Identity API endpoints - route to Identity service
# Identity widget may call these directly, need to route to /.netlify/identity/*
[[redirects]]
  from = "/user"
  to = "/.netlify/identity/user"
  status = 200
  force = true

[[redirects]]
  from = "/settings"
  to = "/.netlify/identity/settings"
  status = 200
  force = true

# Exclude admin folder from catch-all redirect
# This allows config.yml and other admin files to be served directly
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# SEO: extensionless shortcuts → canonical .html
[[redirects]]
  from = "/speaking"
  to = "/speaking.html"
  status = 301

[[redirects]]
  from = "/services/brand-deals"
  to = "/services/brand-deals.html"
  status = 301

[[redirects]]
  from = "/services/trademark"
  to = "/services/trademark.html"
  status = 301

[[redirects]]
  from = "/services/ip"
  to = "/services/ip.html"
  status = 301

[[redirects]]
  from = "/services/employment"
  to = "/services/employment.html"
  status = 301

[[redirects]]
  from = "/services/contracts"
  to = "/services/contracts.html"
  status = 301

# Headers for admin config.yml - ensure correct Content-Type and CORS
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Cache assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for video files - handle large files and HTTP/2 better
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"
    Content-Type = "video/mp4"

# Permissions-Policy to disable compute-pressure (fixes console violation)
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "compute-pressure=()"

[build.environment]
  NODE_VERSION = "20"
