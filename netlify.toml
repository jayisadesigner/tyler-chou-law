[build]
  command = "npm run build"
  publish = "dist"

# Redirect all requests to index.html for SPA routing
# Netlify automatically serves static files (assets) before applying redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure assets and components are served correctly
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/components/*"
  to = "/components/:splat"
  status = 200
  force = true

# Cache assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "18"

