[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ─── Asset caching ────────────────────────────────────────────────────────────
# Eleventy emits /assets/, /styles/, /scripts/ under dist/. They're cache-bustable
# at the file level (image renames, hashed bundles in Phase 5) so we cache hard.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Video files - support range requests for scrubbable playback
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"
    Content-Type = "video/mp4"

# Permissions-Policy to silence the compute-pressure console violation.
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "compute-pressure=()"
